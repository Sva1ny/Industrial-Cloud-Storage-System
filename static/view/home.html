<html>

<head>
  <script src="/file/upload_files/jquery-3.2.1.min.js"></script>
  <!-- 最新版本的 Bootstrap 核心 CSS 文件 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
    crossorigin="anonymous">

  <!-- 可选的 Bootstrap 主题文件（一般不用引入） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap-theme.min.css" integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp"
    crossorigin="anonymous">

  <!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa"
    crossorigin="anonymous"></script>

  <script src="/static/js/auth.js"></script>
</head>

<body style="width:100%;height:100%">
  <div style="width:100%;height:100%;margin:0 0 10px 0;text-align: center;">
    <div style="font-size:20px;font-weight:bold;
                margin:0;background: rgb(195, 228, 250);height:32px;display:flex;align-items:center;justify-content:center;">
      <span style="flex:1;">HomePage of Clouddisk</span>
      <button onclick="logout()" style="margin-right:10px;height:24px;font-size:14px;">Logout</button>
    </div>
    <table style="height:100%;width:100%;text-align: left;border-width: 2px; border-color: lightslategrey;">
      <tbody>
        <tr style="margin-bottom: 20px;">
          <td style="width:20%;height: 100%;background: lightsteelblue;">
            <div style="text-align: top;height:20%;margin: 10px 0 0 10px;">
              <img style="width:80px;height:80px;" src="/static/img/avatar.jpeg"></img><br>
              username: <p id="username" style="color: seagreen"></p>
              signuptime: <p id="regtime" style="color: seagreen"></p>
            </div>
            <div style="height: 80%;"></div>
          </td>
          <td style="width: 3px;height:100%;">
            <div style="width:100%;height: 100%;background:rgb(202, 157, 248);"></div>
          </td>
          <td style="text-align: top;">
            <div> filelist
              <button class="btn btn-success" onclick="toUploadFile()" style="float: right;margin-right: 30px;">upload file
              </button>
              <div style="width:100%;height: 1px;background:rgb(202, 157, 248);margin-top: 15px;"></div>
            </div>
            <div style="height:95%;" style="width:100%;">
              <table id="filetbl" style="margin-left:3%;width:96%;">
                <thead style="height:50px;border:1px;">
                  <tr style="height:50px;border:1px;">
                    <th>filehash</th>
                    <th>filename</th>
                    <th>filesize</th>
                    <th>updatetime</th>
                    <th>lastupdate</th>
                    <th>operation</th>
                  </tr>
                </thead>
              </table>
              <div style="text-align:center;margin:10px;">
                <button id="loadmore" class="btn btn-default" onclick="loadMore()" style="display:none;">load more</button>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>

<script lang="javascript">
  window.onload = function () {
    var username = document.getElementById('username');
    $.ajax({
      url: "/user/info?" + queryParams(),
      type: "GET",
      error: function (jqXHR, textStatus, errorThrown) {
        if (textStatus == "error") {
          alert(textStatus + " : " + errorThrown);
        } else {
          alert(textStatus);
        }
      },
      success: function (body, textStatus, jqXHR) {
        var resp = JSON.parse(body);
        document.getElementById("username").innerHTML = resp.data.Username;
        document.getElementById("regtime").innerHTML = resp.data.SignupAt;
        updateFileList();
      }
    });
  }

  var fileOffset = 0;
  var PAGE_SIZE = 15;

  function updateFileList() {
    fileOffset = 0;
    document.getElementById('filetbl').innerHTML =
      '<thead style="height:50px;border:1px;"><tr style="height:50px;border:1px;">' +
      '<th>filehash</th><th>filename</th><th>filesize</th>' +
      '<th>updatetime</th><th>lastupdate</th><th>operation</th></tr></thead>';
    $.ajax({
      url: "/file/query?" + queryParams(),
      type: "POST",
      data: {
        limit: PAGE_SIZE,
        offset: 0
      },
      error: function (jqXHR, textStatus, errorThrown) {
        if (textStatus == "error") {
          alert(textStatus + " : " + errorThrown);
        } else {
          alert(textStatus);
        }
      },
      success: function (body, textStatus, jqXHR) {
        if (!body) {
          return;
        }
        var data = JSON.parse(body);
        if (!data || data.length <= 0) {
          return;
        }

        for (var i = 0; i < data.length; i++) {
          var x = document.getElementById('filetbl').insertRow();
          var cell = x.insertCell();
          cell.innerHTML = data[i].FileHash.substr(0, 20)+"...";

          cell = x.insertCell();
          cell.innerHTML = data[i].FileName;

          cell = x.insertCell();
          cell.innerHTML = data[i].FileSize;

          cell = x.insertCell();
          cell.innerHTML = data[i].UploadAt;

          cell = x.insertCell();
          cell.innerHTML = data[i].LastUpdated;

          cell = x.insertCell();
          var btn = document.createElement("button");
          btn.className = "btn btn-success";
          btn.style.cssText = "height:30px;margin:5px 0;";
          btn.textContent = "download";
          btn.onclick = (function(fname, fhash) {
            return function() {
              var url = '/file/download?filename=' + encodeURIComponent(fname)
                + '&filehash=' + encodeURIComponent(fhash)
                + '&' + queryParams();
              var iframe = document.createElement("iframe");
              iframe.style.display = "none";
              iframe.src = url;
              document.body.appendChild(iframe);
            };
          })(data[i].FileName, data[i].FileHash);
          cell.appendChild(btn);

          var delBtn = document.createElement("button");
          delBtn.className = "btn btn-danger";
          delBtn.style.cssText = "height:30px;margin:5px 2px;";
          delBtn.textContent = "delete";
          delBtn.onclick = (function(fname) {
            return function() {
              if (!confirm("Delete " + fname + "?")) return;
              $.ajax({
                url: "/file/delete?" + queryParams(),
                type: "POST",
                data: { filename: fname },
                success: function() { location.reload(); },
                error: function() { alert("delete failed"); }
              });
            };
          })(data[i].FileName);
          cell.appendChild(delBtn);
        }
        fileOffset = data.length;
        document.getElementById('loadmore').style.display =
          data.length >= PAGE_SIZE ? 'block' : 'none';
      }
    });
  }

  function loadMore() {
    $.ajax({
      url: "/file/query?" + queryParams(),
      type: "POST",
      data: {
        limit: PAGE_SIZE,
        offset: fileOffset
      },
      success: function (body) {
        if (!body) return;
        var data = JSON.parse(body);
        if (!data || data.length <= 0) {
          document.getElementById('loadmore').style.display = 'none';
          return;
        }
        for (var i = 0; i < data.length; i++) {
          var x = document.getElementById('filetbl').insertRow();
          var cell = x.insertCell();
          cell.innerHTML = data[i].FileHash.substr(0, 20)+"...";

          cell = x.insertCell();
          cell.innerHTML = data[i].FileName;

          cell = x.insertCell();
          cell.innerHTML = data[i].FileSize;

          cell = x.insertCell();
          cell.innerHTML = data[i].UploadAt;

          cell = x.insertCell();
          cell.innerHTML = data[i].LastUpdated;

          cell = x.insertCell();
          var dlBtn = document.createElement("button");
          dlBtn.className = "btn btn-success";
          dlBtn.style.cssText = "height:30px;margin:5px 0;";
          dlBtn.textContent = "download";
          dlBtn.onclick = (function(fname, fhash) {
            return function() {
              var url = '/file/download?filename=' + encodeURIComponent(fname)
                + '&filehash=' + encodeURIComponent(fhash)
                + '&' + queryParams();
              var iframe = document.createElement("iframe");
              iframe.style.display = "none";
              iframe.src = url;
              document.body.appendChild(iframe);
            };
          })(data[i].FileName, data[i].FileHash);
          cell.appendChild(dlBtn);

          var delBtn = document.createElement("button");
          delBtn.className = "btn btn-danger";
          delBtn.style.cssText = "height:30px;margin:5px 2px;";
          delBtn.textContent = "delete";
          delBtn.onclick = (function(fname) {
            return function() {
              if (!confirm("Delete " + fname + "?")) return;
              $.ajax({
                url: "/file/delete?" + queryParams(),
                type: "POST",
                data: { filename: fname },
                success: function() { location.reload(); },
                error: function() { alert("delete failed"); }
              });
            };
          })(data[i].FileName);
          cell.appendChild(delBtn);
        }
        fileOffset += data.length;
        document.getElementById('loadmore').style.display =
          data.length >= PAGE_SIZE ? 'block' : 'none';
      }
    });
  }

  function toUploadFile() {
    window.location.href = '/file/upload?' + queryParams();
  }

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("username");
    window.location.href = '/static/view/signin.html';
  }

</script>

</html>
